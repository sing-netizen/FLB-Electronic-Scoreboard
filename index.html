<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>軟式曲棍球 · 聲控電子牌</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #0b1a2e 0%, #1a2f44 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
        }

        .scoreboard {
            max-width: 780px;
            width: 100%;
            background: #1f3a4b;
            background-image: radial-gradient(circle at 20% 30%, #2d4b5e, #142b39);
            border-radius: 72px 72px 48px 48px;
            padding: 32px 24px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 0 2px #7fa9b9 inset, 0 0 0 4px #3e5f6f inset;
            transition: all 0.2s;
            border: 1px solid #8bb3c4;
        }

        /* 隊伍名稱及分數區域 */
        .teams {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .team {
            flex: 1;
            min-width: 140px;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(2px);
            border-radius: 60px;
            padding: 20px 12px 24px;
            box-shadow: 0 8px 0 #0b1a1f, 0 10px 20px rgba(0,0,0,0.5);
            border-bottom: 3px solid #f5c542;
            text-align: center;
            transition: 0.15s;
        }

        .team.away {
            border-bottom-color: #6fc2e6;
        }

        .team-name {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #f2f9ff;
            text-shadow: 0 3px 0 #0f212b, 0 5px 12px #00000066;
            margin-bottom: 12px;
            word-break: break-word;
        }

        .score {
            font-size: 6.2rem;
            font-weight: 800;
            line-height: 1;
            color: #fff8e7;
            text-shadow: 0 4px 0 #3a281c, 0 8px 20px #00000099;
            background: #0f212e;
            padding: 6px 10px;
            border-radius: 40px;
            display: inline-block;
            min-width: 120px;
            letter-spacing: 4px;
            box-shadow: inset 0 -6px 0 #2e4a57, 0 6px 0 #0b141c;
            margin-bottom: 16px;
            font-variant-numeric: tabular-nums;
        }

        .score-controls {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .btn {
            background: #e9f0f5;
            border: none;
            border-radius: 48px;
            padding: 14px 20px;
            min-width: 72px;
            font-size: 2.2rem;
            font-weight: 700;
            color: #1d3543;
            box-shadow: 0 6px 0 #6a7f8a, 0 10px 18px #00000055;
            cursor: pointer;
            transition: all 0.06s linear;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
            border: 1px solid #bfd9e6;
            touch-action: manipulation;
            flex: 1 1 auto;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 1px 0 #4d626e;
        }

        .btn.plus {
            background: #b3e0b0;
            box-shadow: 0 6px 0 #40834a;
            color: #16331b;
        }

        .btn.minus {
            background: #f8b5b5;
            box-shadow: 0 6px 0 #a34848;
            color: #4d1a1a;
        }

        .btn.reset {
            background: #d3dbe0;
            box-shadow: 0 6px 0 #6b7b84;
            font-size: 1.6rem;
            padding: 14px 18px;
            min-width: 60px;
        }

        .btn.speak {
            background: #d4c9f0;
            box-shadow: 0 6px 0 #73668f;
            color: #281f3d;
            font-size: 1.7rem;
            padding: 14px 24px;
            min-width: 110px;
        }

        .action-bar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 16px;
            margin: 20px 0 12px;
        }

        .global-reset {
            background: #2f4050;
            box-shadow: 0 6px 0 #131f28;
            color: #f0f7fc;
            border: 1px solid #608194;
            padding: 12px 28px;
            font-size: 1.6rem;
            border-radius: 60px;
            flex: 0 1 auto;
        }

        .status-area {
            background: #0e1f2bcc;
            backdrop-filter: blur(4px);
            border-radius: 80px;
            padding: 16px 24px;
            margin-top: 22px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 14px 24px;
            border: 1px solid #5c869b;
            box-shadow: inset 0 2px 6px #00000066;
        }

        .readout {
            font-size: 1.8rem;
            font-weight: 600;
            color: #daf0ff;
            background: #142f3d;
            padding: 6px 28px;
            border-radius: 60px;
            letter-spacing: 2px;
            box-shadow: inset 0 -3px 0 #3e6579;
            font-variant-numeric: tabular-nums;
            display: inline-block;
        }

        .readout span {
            color: #ffd966;
            margin: 0 6px;
        }

        .voice-indicator {
            color: #a0d0e0;
            font-size: 1.6rem;
            background: #1b3545;
            padding: 6px 24px;
            border-radius: 50px;
            border-left: 4px solid #b9d8e8;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .voice-indicator i {
            font-style: normal;
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #6fc2e6;
            border-radius: 50%;
            box-shadow: 0 0 10px #6fc2e6aa;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.3; transform: scale(0.9); }
        }

        .footnote {
            text-align: center;
            margin-top: 20px;
            color: #7799aa;
            font-size: 0.9rem;
            letter-spacing: 0.8px;
            opacity: 0.8;
        }

        @media (max-width: 580px) {
            .scoreboard { padding: 20px 14px; }
            .team { padding: 16px 6px; }
            .score { font-size: 4.6rem; min-width: 80px; }
            .btn { font-size: 1.8rem; padding: 12px 12px; min-width: 56px; }
            .team-name { font-size: 1.4rem; }
            .readout { font-size: 1.4rem; padding: 4px 16px; }
        }
    </style>
</head>
<body>
    <div class="scoreboard" role="main" aria-label="軟式曲棍球電子計分牌">
        <!-- 兩隊 -->
        <div class="teams">
            <!-- 主隊 -->
            <div class="team home">
                <div class="team-name" id="homeTeamName">🏒 主隊</div>
                <div class="score" id="homeScore">0</div>
                <div class="score-controls">
                    <button class="btn plus" data-team="home" data-delta="1" aria-label="主隊加一分">➕</button>
                    <button class="btn minus" data-team="home" data-delta="-1" aria-label="主隊減一分">➖</button>
                </div>
            </div>
            <!-- 客隊 -->
            <div class="team away">
                <div class="team-name" id="awayTeamName">🏒 客隊</div>
                <div class="score" id="awayScore">0</div>
                <div class="score-controls">
                    <button class="btn plus" data-team="away" data-delta="1" aria-label="客隊加一分">➕</button>
                    <button class="btn minus" data-team="away" data-delta="-1" aria-label="客隊減一分">➖</button>
                </div>
            </div>
        </div>

        <!-- 額外控制：重設及讀出分數 -->
        <div class="action-bar">
            <button class="btn speak" id="speakScoreBtn" aria-label="以語音讀出目前比數">🔊 讀出比數</button>
            <button class="btn global-reset" id="resetAllBtn" aria-label="重設兩隊分數為零">⟲ 重設</button>
        </div>

        <!-- 狀態列：即時顯示「比」 及 聲控狀態 -->
        <div class="status-area">
            <div class="readout" id="scoreReadout">
                <span id="homeReadout">0</span> 比 <span id="awayReadout">0</span>
            </div>
            <div class="voice-indicator" id="voiceIndicator">
                <i></i> 聲控就緒
            </div>
        </div>
        <div class="footnote">按➕/➖ 加分或減分 · 點擊「讀出比數」聽取分數</div>
    </div>

    <script>
        (function() {
            "use strict";

            // DOM 元素
            const homeScoreEl = document.getElementById('homeScore');
            const awayScoreEl = document.getElementById('awayScore');
            const homeReadoutEl = document.getElementById('homeReadout');
            const awayReadoutEl = document.getElementById('awayReadout');
            const speakBtn = document.getElementById('speakScoreBtn');
            const resetBtn = document.getElementById('resetAllBtn');

            // 分數狀態 (數字)
            let homeScore = 0;
            let awayScore = 0;

            // 語音合成支援檢查
            const speechSupported = 'speechSynthesis' in window && window.speechSynthesis;

            // 更新所有顯示 (數字、讀出區)
            function updateDisplay() {
                homeScoreEl.textContent = homeScore;
                awayScoreEl.textContent = awayScore;
                homeReadoutEl.textContent = homeScore;
                awayReadoutEl.textContent = awayScore;
            }

            // 語音讀出「X 比 Y」 (X: 主隊, Y: 客隊)
            function speakScore() {
                if (!speechSupported) {
                    alert('你的瀏覽器不支援語音合成，請使用 Chrome / Edge / Safari 等現代瀏覽器。');
                    return;
                }

                // 取消任何正在播放的語音 (避免干擾)
                window.speechSynthesis.cancel();

                const text = `${homeScore} 比 ${awayScore}`;
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-HK';          // 香港粵語/中文
                utterance.rate = 0.92;
                utterance.pitch = 1.0;
                utterance.volume = 1;

                // 可選：更自然的語音 (若存在)
                const voices = window.speechSynthesis.getVoices();
                const zhVoice = voices.find(v => v.lang.startsWith('zh') || v.lang.startsWith('yue'));
                if (zhVoice) utterance.voice = zhVoice;

                // 讀出時視覺提示
                const indicator = document.getElementById('voiceIndicator');
                if (indicator) {
                    indicator.innerHTML = '<i></i> 🔊 讀出中...';
                    setTimeout(() => {
                        indicator.innerHTML = '<i></i> 聲控就緒';
                    }, 1500);
                }

                window.speechSynthesis.speak(utterance);

                // 處理錯誤 (例如語音被阻擋)
                utterance.onerror = function(e) {
                    console.warn('語音錯誤:', e);
                    if (indicator) indicator.innerHTML = '<i></i> 聲控就緒';
                };
            }

            // 修改分數 (delta: +1 或 -1)
            function changeScore(team, delta) {
                if (team !== 'home' && team !== 'away') return;

                // 確保 delta 是整數 1 或 -1 (安全)
                const change = (delta === 1) ? 1 : (delta === -1) ? -1 : 0;
                if (change === 0) return;

                if (team === 'home') {
                    const newVal = homeScore + change;
                    if (newVal < 0) {
                        // 不允許負分，但可提示（保持0）
                        homeScore = 0;
                    } else {
                        homeScore = newVal;
                    }
                } else { // away
                    const newVal = awayScore + change;
                    if (newVal < 0) {
                        awayScore = 0;
                    } else {
                        awayScore = newVal;
                    }
                }

                // 更新畫面
                updateDisplay();

                // 加分/減分後自動讀出分數 (聲控模式)
                // 但為了避免太頻繁，用微延遲讓點擊手感順暢，但讀出功能依然執行。
                // 這裡我們直接呼叫讀出，讓使用者得到即時反饋。
                // 但若連續快速點擊，會取消前一個語音再讀新的，符合直覺。
                if (speechSupported) {
                    // 取消正在讀的，立刻讀新的
                    window.speechSynthesis.cancel();
                    speakScore();
                } else {
                    // 不支援語音時，單純更新顯示
                }
            }

            // 重設分數
            function resetScores() {
                homeScore = 0;
                awayScore = 0;
                updateDisplay();

                // 重設後可選擇讀出「0 比 0」或者靜默。這裡讀出讓用家知道已歸零。
                if (speechSupported) {
                    window.speechSynthesis.cancel();
                    speakScore();
                }
            }

            // 綁定按鈕事件 (使用事件代理)
            function setupEventListeners() {
                // 所有按鈕統一用代理監聽 (加分/減分)
                document.querySelector('.scoreboard').addEventListener('click', function(e) {
                    const target = e.target.closest('button');
                    if (!target) return;

                    // 處理加分/減分按鈕 (data-team, data-delta)
                    const team = target.dataset.team;
                    const deltaStr = target.dataset.delta;
                    if (team && deltaStr) {
                        const delta = parseInt(deltaStr, 10);
                        if (!isNaN(delta) && (delta === 1 || delta === -1)) {
                            changeScore(team, delta);
                            e.preventDefault();
                        }
                        return;
                    }

                    // 讀出比數按鈕
                    if (target.id === 'speakScoreBtn') {
                        if (speechSupported) {
                            window.speechSynthesis.cancel();
                            speakScore();
                        } else {
                            alert('語音功能不支援，請更新瀏覽器。');
                        }
                        e.preventDefault();
                        return;
                    }

                    // 重設按鈕
                    if (target.id === 'resetAllBtn') {
                        resetScores();
                        e.preventDefault();
                        return;
                    }
                });

                // 避免觸控時雙擊選取文字
                document.querySelectorAll('button').forEach(btn => {
                    btn.addEventListener('mousedown', (e) => e.preventDefault());
                });

                // 確保語音合成voices加載後更新 (部分瀏覽器非同步)
                if (speechSupported) {
                    window.speechSynthesis.onvoiceschanged = () => {
                        // 可選：預先載入語音
                        window.speechSynthesis.getVoices();
                    };
                }
            }

            // 初始化顯示
            function init() {
                updateDisplay();

                // 若支援語音，顯示就緒；否則顯示提示
                const indicator = document.getElementById('voiceIndicator');
                if (!speechSupported && indicator) {
                    indicator.innerHTML = '⚠️ 語音不支援';
                    indicator.style.borderLeftColor = '#d98c8c';
                } else if (indicator) {
                    indicator.innerHTML = '<i></i> 聲控就緒';
                }

                setupEventListeners();

                // 初次載入時，讀出一次分數 (可選)
                // 但可能造成干擾，故不自動讀取。使用者可點擊按鈕。
                console.log('軟式曲棍球電子牌已啟動，按「讀出比數」或加減分會自動讀出。');
            }

            // 啟動
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>
</body>
</html>
