<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>軟式曲棍球電子牌 - 聲控比分</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* 避免點擊時選取文字 */
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #1a2a3a, #0b1219);
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .scoreboard {
            max-width: 800px;
            width: 100%;
            background: rgba(10, 20, 30, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 80px 80px 60px 60px;
            padding: 30px 20px 40px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.7), 0 0 0 2px #3c5a7a inset, 0 0 0 4px #1c2e40 inset;
            border: 1px solid #6a8db0;
            transition: all 0.1s;
        }
        h1 {
            text-align: center;
            color: #d0e4ff;
            font-weight: 400;
            letter-spacing: 6px;
            text-shadow: 0 2px 0 #0a1a2a, 0 0 12px #3f7bb0;
            margin: -8px 0 12px 0;
            font-size: 1.6rem;
            word-break: keep-all;
        }
        .teams {
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            align-items: stretch;
            gap: 12px;
            margin: 12px 0 6px;
        }
        .team {
            flex: 1;
            background: #142433;
            border-radius: 60px 60px 40px 40px;
            padding: 14px 6px 18px;
            box-shadow: inset 0 -8px 0 #0a1622, 0 10px 18px rgba(0,0,0,0.5);
            border-bottom: 3px solid #3f7bb0;
            transition: transform 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .team-name {
            color: #bdd6f0;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-shadow: 0 2px 0 #0d1b2b;
            margin-bottom: 6px;
        }
        .score-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 6px 0 4px;
        }
        .score-btn {
            background: #1d3147;
            border: none;
            border-radius: 40px;
            color: #f0f9ff;
            font-size: 3.2rem;
            font-weight: 700;
            width: 80px;
            height: 80px;
            line-height: 1;
            box-shadow: 0 6px 0 #0b1727, 0 8px 16px rgba(0,0,0,0.6);
            transition: all 0.04s linear;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 2px 0 #0a1a2a;
            touch-action: manipulation;
            border: 1px solid #3b6a8f;
        }
        .score-btn:active {
            transform: translateY(6px);
            box-shadow: 0 1px 0 #0b1727, 0 6px 12px rgba(0,0,0,0.6);
        }
        .score-btn.minus {
            background: #2f1f2a;
            border-color: #7a4a5a;
            color: #ffc9d9;
            box-shadow: 0 6px 0 #1e121b, 0 8px 16px rgba(0,0,0,0.6);
        }
        .score-number {
            font-size: 4.8rem;
            font-weight: 700;
            min-width: 80px;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 0 20px #6aafee, 0 4px 0 #0e1f30;
            letter-spacing: 2px;
            background: #0c1a28;
            padding: 0 8px;
            border-radius: 30px;
            line-height: 1.3;
            border: 1px solid #3f74a0;
        }
        .vs-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            font-size: 1.2rem;
            color: #8ab3d9;
            font-weight: 300;
        }
        .vs-badge {
            background: #1d3147;
            border-radius: 40px;
            padding: 6px 12px;
            font-weight: 700;
            color: #c0daf5;
            border: 1px solid #4b7a9f;
            box-shadow: inset 0 0 8px #1f3f5a;
            font-size: 1.2rem;
        }
        .control-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            margin-top: 28px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #1f334a;
            border: none;
            border-radius: 100px;
            padding: 14px 26px;
            color: #ebf5ff;
            font-size: 1.4rem;
            font-weight: 500;
            box-shadow: 0 6px 0 #0f1e2e, 0 8px 16px rgba(0,0,0,0.5);
            transition: 0.04s linear;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #4d7a9e;
            touch-action: manipulation;
            letter-spacing: 2px;
        }
        .action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 1px 0 #0f1e2e, 0 6px 12px rgba(0,0,0,0.5);
        }
        .action-btn.speak {
            background: #2a4d5a;
            border-color: #5d9bb0;
            box-shadow: 0 6px 0 #1a3340, 0 8px 16px rgba(0,0,0,0.5);
        }
        .action-btn.reset {
            background: #4a2f3a;
            border-color: #8f5a6a;
            box-shadow: 0 6px 0 #2f1d26, 0 8px 16px rgba(0,0,0,0.5);
        }
        .footer {
            margin-top: 30px;
            color: #5f7f9a;
            text-align: center;
            font-size: 0.9rem;
            border-top: 1px solid #2b4a60;
            padding-top: 16px;
            letter-spacing: 1px;
        }
        @media (max-width: 600px) {
            .scoreboard { padding: 20px 10px 30px; border-radius: 50px; }
            .team-name { font-size: 1.4rem; }
            .score-btn { width: 64px; height: 64px; font-size: 2.6rem; }
            .score-number { font-size: 3.6rem; min-width: 60px; }
            .vs-badge { font-size: 1rem; padding: 4px 10px; }
            .action-btn { padding: 10px 18px; font-size: 1.0rem; }
        }
        @media (max-width: 420px) {
            .score-btn { width: 54px; height: 54px; font-size: 2.2rem; }
            .score-number { font-size: 2.8rem; min-width: 50px; }
            .team-name { font-size: 1.2rem; }
        }
        /* 讀出狀態提示 */
        .speech-indicator {
            color: #b3d9f0;
            background: #1a3349;
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.9rem;
            border: 1px solid #3d7a9a;
            box-shadow: inset 0 0 10px #17334a;
            display: inline-block;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }
    </style>
</head>
<body>
    <div class="scoreboard" role="main">
        <h1>🏑 軟式曲棍球</h1>
        <div class="teams">
            <!-- 主隊 -->
            <div class="team" id="teamA">
                <div class="team-name">🟦 主隊</div>
                <div class="score-container">
                    <button class="score-btn minus" data-team="A" data-delta="-1" aria-label="主隊減1分">−</button>
                    <div class="score-number" id="scoreA">0</div>
                    <button class="score-btn" data-team="A" data-delta="1" aria-label="主隊加1分">+</button>
                </div>
            </div>
            <!-- VS 分隔 -->
            <div class="vs-section">
                <div class="vs-badge">⚡ VS</div>
                <div style="font-size:0.9rem; margin-top:4px; color:#759bbd;">比</div>
            </div>
            <!-- 客隊 -->
            <div class="team" id="teamB">
                <div class="team-name">🟥 客隊</div>
                <div class="score-container">
                    <button class="score-btn minus" data-team="B" data-delta="-1" aria-label="客隊減1分">−</button>
                    <div class="score-number" id="scoreB">0</div>
                    <button class="score-btn" data-team="B" data-delta="1" aria-label="客隊加1分">+</button>
                </div>
            </div>
        </div>

        <!-- 控制列 + 聲控模式 -->
        <div class="control-bar">
            <div class="flex-row">
                <button class="action-btn speak" id="speakBtn" aria-label="讀出比分（聲控模式）">🔊 讀出比分</button>
                <button class="action-btn reset" id="resetBtn" aria-label="重設比分">↺ 重設</button>
            </div>
            <div class="speech-indicator" id="speechStatus">🔈 點擊「讀出比分」</div>
        </div>

        <!-- 額外說明：按分數加減，聲控讀出「比」 -->
        <div class="footer">
            <span>⚡ 直接點擊分數數字加減 &nbsp;·&nbsp; 語音讀出「<strong>X 比 Y</strong>」</span>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // DOM 元素
            const scoreElA = document.getElementById('scoreA');
            const scoreElB = document.getElementById('scoreB');
            const speechStatus = document.getElementById('speechStatus');

            // 分數狀態 (內部)
            let scoreA = 0;
            let scoreB = 0;

            // 語音合成支援
            const synth = window.speechSynthesis;
            let utterance = null;
            let speechSupported = ('speechSynthesis' in window);

            // 更新顯示
            function updateDisplay() {
                scoreElA.textContent = scoreA;
                scoreElB.textContent = scoreB;
            }

            // 核心：加分/減分 (delta: +1 或 -1)
            function adjustScore(team, delta) {
                if (team === 'A') {
                    const newVal = scoreA + delta;
                    if (newVal < 0) {
                        // 不低於0 (但可以保持0)
                        if (scoreA === 0) return;
                        scoreA = 0;
                    } else {
                        scoreA = newVal;
                    }
                } else if (team === 'B') {
                    const newVal = scoreB + delta;
                    if (newVal < 0) {
                        if (scoreB === 0) return;
                        scoreB = 0;
                    } else {
                        scoreB = newVal;
                    }
                } else {
                    return;
                }
                updateDisplay();
                // 每次分數變動後，自動讀出比分 (聲控模式)
                speakScore('auto');
            }

            // 讀出比分 : 讀出「X 比 Y」 (例如 7 比 3)
            function speakScore(trigger = 'manual') {
                if (!speechSupported) {
                    speechStatus.textContent = '⚠️ 瀏覽器不支援語音';
                    return;
                }
                // 取消任何正在進行的語音
                if (synth.speaking) {
                    synth.cancel();
                }

                const text = `${scoreA} 比 ${scoreB}`;
                utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-HK';  // 粵語/中文
                utterance.rate = 0.9;
                utterance.pitch = 1.1;
                utterance.volume = 1;

                // 狀態提示
                if (trigger === 'manual') {
                    speechStatus.textContent = `🔊 讀出: 「${text}」`;
                } else {
                    speechStatus.textContent = `🔊 自動讀出: 「${text}」`;
                }

                utterance.onstart = function() {
                    // 可選: 增加視覺回饋
                };
                utterance.onend = function() {
                    speechStatus.textContent = `✅ 已讀出: 「${text}」`;
                };
                utterance.onerror = function(e) {
                    speechStatus.textContent = `❌ 語音錯誤: ${e.error || '未知'}`;
                };

                synth.speak(utterance);
            }

            // 重置分數
            function resetScore() {
                if (synth && synth.speaking) synth.cancel();
                scoreA = 0;
                scoreB = 0;
                updateDisplay();
                speechStatus.textContent = '🔄 分數已重設';
                // 重設後讀出 0 比 0
                speakScore('auto');
            }

            // ---------- 事件綁定 (按鈕) ----------
            // 使用事件代理 (捕獲所有 .score-btn)
            document.querySelector('.teams').addEventListener('click', function(e) {
                const btn = e.target.closest('.score-btn');
                if (!btn) return;
                const team = btn.getAttribute('data-team');
                const delta = parseInt(btn.getAttribute('data-delta'), 10);
                if (team && !isNaN(delta)) {
                    e.stopPropagation();
                    adjustScore(team, delta);
                }
            });

            // 讀出比分按鈕 (手動觸發)
            document.getElementById('speakBtn').addEventListener('click', function(e) {
                e.stopPropagation();
                speakScore('manual');
            });

            // 重設按鈕
            document.getElementById('resetBtn').addEventListener('click', function(e) {
                e.stopPropagation();
                resetScore();
            });

            // 鍵盤快捷鍵 (加分/減分) : 可選，但保留使用體驗
            // 1: 主隊+1, 2: 主隊-1, 3: 客隊+1, 4: 客隊-1 (只做為輔助)
            document.addEventListener('keydown', function(e) {
                const key = e.key;
                // 避免干擾輸入框等
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                // 數字鍵盤或主鍵盤數字
                if (key === '1') { adjustScore('A', 1); e.preventDefault(); }
                else if (key === '2') { adjustScore('A', -1); e.preventDefault(); }
                else if (key === '3') { adjustScore('B', 1); e.preventDefault(); }
                else if (key === '4') { adjustScore('B', -1); e.preventDefault(); }
                else if (key === '0' || key === 'r') { resetScore(); e.preventDefault(); }
                else if (key === 's' || key === 'S') { speakScore('manual'); e.preventDefault(); }
            });

            // 初始化顯示
            updateDisplay();

            // 初次載入時讀出一次比分 (讓用家知道功能)
            window.addEventListener('load', function() {
                setTimeout(() => {
                    if (speechSupported) {
                        speakScore('auto');
                    } else {
                        speechStatus.textContent = '⚠️ 語音不支援，請使用 Chrome / Edge / Safari';
                    }
                }, 500);
            });

            // 若語音支援但不發聲，提示
            if (!speechSupported) {
                speechStatus.textContent = '⚠️ 此瀏覽器不支援語音合成';
            }

            // 增加額外觸覺回饋 (手機震動可選)
            // 但無需額外處理

        })();
    </script>
</body>
</html>
