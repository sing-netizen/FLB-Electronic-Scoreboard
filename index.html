<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>軟式曲棍球 電子記分牌</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #0b1a2e 0%, #1a2f44 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .scoreboard {
            max-width: 850px;
            width: 100%;
            background: #1e3a5f;
            background: radial-gradient(circle at 20% 30%, #2a4b72, #0f2a44);
            border-radius: 72px 72px 48px 48px;
            padding: 32px 28px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 0 2px #6d8eb0 inset;
            transition: all 0.2s;
            border: 1px solid #b0cee8;
        }

        /* 隊名 + 分數區域 */
        .team-container {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: stretch;
            gap: 12px;
            margin-bottom: 28px;
        }

        .team-card {
            background: #0f1f30;
            background: linear-gradient(145deg, #142b3f, #0a1a29);
            border-radius: 48px 48px 28px 28px;
            padding: 20px 12px 24px;
            flex: 1;
            box-shadow: inset 0 -6px 0 #3b5f7a, 0 8px 16px rgba(0,0,0,0.6);
            border: 1px solid #4d7a9e;
            text-align: center;
            transition: 0.1s;
            min-width: 120px;
        }

        .team-name {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #f2f9ff;
            text-shadow: 0 2px 4px #00000066;
            background: #1f405b;
            display: inline-block;
            padding: 0 20px;
            border-radius: 40px;
            line-height: 1.4;
            margin-bottom: 12px;
            border: 1px solid #7ea6c9;
            box-shadow: inset 0 1px 3px #b3d6f0;
        }

        .score-display {
            font-size: 8rem;          /* 特大分數 */
            font-weight: 800;
            line-height: 1.1;
            color: #f5fcff;
            text-shadow: 0 6px 0 #0a1e2e, 0 12px 18px #00000099;
            background: #0b1f2e;
            border-radius: 60px;
            padding: 6px 6px 0;
            margin: 10px 0 16px;
            letter-spacing: 6px;
            border: 2px solid #6b93b5;
            box-shadow: inset 0 -8px 0 #27445c;
            font-variant-numeric: tabular-nums;
            transition: 0.1s;
        }

        .score-display:active {
            transform: scale(0.96);
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .btn-score {
            background: #2b5170;
            border: none;
            border-radius: 60px;
            padding: 14px 28px;
            font-size: 2.2rem;
            font-weight: 700;
            color: white;
            box-shadow: 0 6px 0 #12303f, 0 8px 14px #00000055;
            transition: all 0.06s linear;
            cursor: pointer;
            min-width: 100px;
            border: 1px solid #90b8da;
            text-shadow: 0 1px 2px black;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 1 1 auto;
        }

        .btn-score:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0a1f2b;
        }

        .btn-score.plus {
            background: #2d7a4a;
            border-color: #87c7a2;
        }

        .btn-score.plus:active {
            background: #1b5f36;
        }

        .btn-score.minus {
            background: #a14343;
            border-color: #e08787;
        }

        .btn-score.minus:active {
            background: #7e2f2f;
        }

        /* 中間「VS」裝飾 */
        .vs-divider {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #b3d6f0;
            font-size: 2.5rem;
            font-weight: 800;
            text-shadow: 0 4px 0 #0c1f2e;
            padding: 0 6px;
            letter-spacing: 2px;
            min-width: 60px;
        }

        .vs-divider small {
            font-size: 1.2rem;
            background: #1f3c54;
            padding: 4px 12px;
            border-radius: 40px;
            border: 1px solid #6e96b9;
        }

        /* 聲控模式 + 重置 */
        .control-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 20px 30px;
            margin-top: 30px;
            padding: 16px 12px;
            background: #0f283d;
            border-radius: 120px;
            border: 1px solid #3d6b8a;
            box-shadow: inset 0 2px 10px #040d16;
        }

        .voice-toggle {
            background: #346d8f;
            border: none;
            border-radius: 60px;
            padding: 12px 28px;
            font-size: 1.8rem;
            font-weight: 600;
            color: white;
            box-shadow: 0 5px 0 #10405a;
            cursor: pointer;
            transition: 0.08s linear;
            border: 1px solid #79b0d4;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .voice-toggle:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #10405a;
        }

        .voice-toggle.active {
            background: #2b8f5e;
            border-color: #9be0b8;
            box-shadow: 0 5px 0 #1c5a3a;
        }

        .reset-btn {
            background: #5d4d3b;
            border: none;
            border-radius: 60px;
            padding: 12px 32px;
            font-size: 1.8rem;
            font-weight: 600;
            color: #f5f0e6;
            box-shadow: 0 5px 0 #3d2f22;
            cursor: pointer;
            border: 1px solid #b39274;
            transition: 0.08s linear;
        }

        .reset-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #3d2f22;
        }

        .voice-indicator {
            color: #bfdef5;
            font-size: 1.4rem;
            background: #102b3d;
            padding: 6px 22px;
            border-radius: 40px;
            border: 1px solid #4e7c9b;
            font-weight: 500;
        }

        /* 響應式 */
        @media (max-width: 700px) {
            .team-container {
                flex-direction: column;
                align-items: stretch;
            }
            .vs-divider {
                flex-direction: row;
                padding: 8px 0;
                font-size: 2rem;
                min-width: unset;
            }
            .vs-divider small {
                font-size: 1.2rem;
                margin-left: 12px;
            }
            .score-display {
                font-size: 6rem;
            }
            .btn-score {
                font-size: 1.8rem;
                padding: 12px 16px;
                min-width: 80px;
            }
            .team-name {
                font-size: 1.6rem;
            }
        }

        @media (max-width: 450px) {
            .score-display {
                font-size: 4.5rem;
                letter-spacing: 2px;
            }
            .btn-score {
                font-size: 1.5rem;
                padding: 10px 10px;
                min-width: 70px;
            }
            .voice-toggle, .reset-btn {
                font-size: 1.4rem;
                padding: 10px 18px;
            }
        }

        /* 輔助 */
        .clickable {
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>
<div class="scoreboard">
    <!-- 兩隊 -->
    <div class="team-container">
        <!-- 主隊 A -->
        <div class="team-card" id="teamA">
            <div class="team-name">🏒 主隊</div>
            <div class="score-display" id="scoreA">0</div>
            <div class="btn-group">
                <button class="btn-score plus" data-team="A" data-delta="1">➕ 加</button>
                <button class="btn-score minus" data-team="A" data-delta="-1">➖ 減</button>
            </div>
        </div>

        <!-- VS 分隔 -->
        <div class="vs-divider">
            <span>⚡</span>
            <small>VS</small>
        </div>

        <!-- 客隊 B -->
        <div class="team-card" id="teamB">
            <div class="team-name">🏒 客隊</div>
            <div class="score-display" id="scoreB">0</div>
            <div class="btn-group">
                <button class="btn-score plus" data-team="B" data-delta="1">➕ 加</button>
                <button class="btn-score minus" data-team="B" data-delta="-1">➖ 減</button>
            </div>
        </div>
    </div>

    <!-- 控制欄 : 聲控 + 重置 -->
    <div class="control-bar">
        <button class="voice-toggle" id="voiceToggleBtn">🔊 聲控</button>
        <button class="reset-btn" id="resetBtn">⟳ 重置</button>
        <span class="voice-indicator" id="voiceStatus">⏺ 關閉</span>
    </div>
</div>

<script>
    (function() {
        // --- DOM refs ---
        const scoreAEl = document.getElementById('scoreA');
        const scoreBEl = document.getElementById('scoreB');
        const voiceToggleBtn = document.getElementById('voiceToggleBtn');
        const voiceStatus = document.getElementById('voiceStatus');
        const resetBtn = document.getElementById('resetBtn');

        // --- state ---
        let scoreA = 0;
        let scoreB = 0;
        let voiceEnabled = false;      // 預設關閉聲控

        // --- 語音合成輔助 (讀出「X比Y」) ---
        function speakScore(team, newScore, opponentScore) {
            if (!voiceEnabled) return;

            // 判定邊隊，讀出「主隊/客隊」＋分數＋「比」＋對手分數
            let teamName = (team === 'A') ? '主隊' : '客隊';
            // 組合語句: e.g. "主隊 7 比 3"
            const utteranceText = `${teamName} ${newScore} 比 ${opponentScore}`;

            if (window.speechSynthesis) {
                // 取消任何正在播放的語音，避免疊加混亂
                window.speechSynthesis.cancel();

                const msg = new SpeechSynthesisUtterance(utteranceText);
                msg.lang = 'zh-HK';          // 粵語 / 中文
                msg.rate = 0.95;
                msg.pitch = 1.0;
                msg.volume = 1;
                // 選用粵語/中文語音 (如果瀏覽器支援)
                const voices = window.speechSynthesis.getVoices();
                // 嘗試找 zh-HK / 中文 語音
                const preferredVoice = voices.find(v => v.lang.startsWith('zh'));
                if (preferredVoice) msg.voice = preferredVoice;
                window.speechSynthesis.speak(msg);
            } else {
                console.warn('此瀏覽器不支援 Speech Synthesis');
            }
        }

        // --- 更新分數顯示 (並觸發語音) ---
        function updateScore(team, delta) {
            let newScore, opponentScore;
            if (team === 'A') {
                // 防止分數低於 0
                if (scoreA + delta < 0) {
                    // 可選震動回饋或忽略
                    return;
                }
                scoreA = scoreA + delta;
                scoreAEl.textContent = scoreA;
                newScore = scoreA;
                opponentScore = scoreB;
            } else { // team B
                if (scoreB + delta < 0) {
                    return;
                }
                scoreB = scoreB + delta;
                scoreBEl.textContent = scoreB;
                newScore = scoreB;
                opponentScore = scoreA;
            }

            // 語音讀出: 讀出該隊分數變化 (讀出「隊名 + 分數 + 比 + 對手分數」)
            speakScore(team, newScore, opponentScore);
        }

        // --- 重置分數 ---
        function resetScores() {
            // 如果啟用語音，重置時也讀出「0比0」
            const oldA = scoreA;
            const oldB = scoreB;

            scoreA = 0;
            scoreB = 0;
            scoreAEl.textContent = '0';
            scoreBEl.textContent = '0';

            if (voiceEnabled) {
                // 重置時讀出「0比0」，但用哪一隊名義？ 我們讀「比賽重置 0 比 0」
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                    const msg = new SpeechSynthesisUtterance('比分重置 零 比 零');
                    msg.lang = 'zh-HK';
                    const voices = window.speechSynthesis.getVoices();
                    const preferred = voices.find(v => v.lang.startsWith('zh'));
                    if (preferred) msg.voice = preferred;
                    window.speechSynthesis.speak(msg);
                }
            }
        }

        // --- 切換聲控模式 ---
        function toggleVoice() {
            voiceEnabled = !voiceEnabled;
            if (voiceEnabled) {
                voiceToggleBtn.classList.add('active');
                voiceStatus.textContent = '🎤 聲控開';
                // 可讀出提示 (但唔強制)
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                    const msg = new SpeechSynthesisUtterance('聲控模式已開啟');
                    msg.lang = 'zh-HK';
                    const voices = window.speechSynthesis.getVoices();
                    const preferred = voices.find(v => v.lang.startsWith('zh'));
                    if (preferred) msg.voice = preferred;
                    window.speechSynthesis.speak(msg);
                }
            } else {
                voiceToggleBtn.classList.remove('active');
                voiceStatus.textContent = '⏺ 關閉';
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                }
            }
        }

        // --- 事件綁定 (按鈕加分/減分) ---
        function handleScoreClick(e) {
            const btn = e.currentTarget;
            const team = btn.dataset.team;    // 'A' 或 'B'
            const delta = parseInt(btn.dataset.delta, 10);
            if (isNaN(delta)) return;
            updateScore(team, delta);
        }

        // --- 初始化語音 (preload voices) ---
        function preloadVoices() {
            if (window.speechSynthesis) {
                // 觸發載入語音清單
                window.speechSynthesis.getVoices();
                // 部分瀏覽器需要事件
                window.speechSynthesis.onvoiceschanged = () => {
                    window.speechSynthesis.getVoices();
                };
            }
        }

        // --- 附加: 點擊分數也可加1 (直覺操作) 但已用按鈕, 但我們為分數顯示加上點擊加分 (直接加1) ---
        function handleScoreDisplayClick(e) {
            // 判斷點擊的是 A 或 B 的分數顯示
            const el = e.currentTarget;
            if (el.id === 'scoreA') {
                updateScore('A', 1);
            } else if (el.id === 'scoreB') {
                updateScore('B', 1);
            }
        }

        // --- 註冊所有按鈕 ---
        function init() {
            // 所有 .btn-score
            const scoreBtns = document.querySelectorAll('.btn-score');
            scoreBtns.forEach(btn => {
                btn.addEventListener('click', handleScoreClick);
            });

            // 分數顯示點擊加1 (直接點分數)
            scoreAEl.addEventListener('click', handleScoreDisplayClick);
            scoreBEl.addEventListener('click', handleScoreDisplayClick);

            // 聲控按鈕
            voiceToggleBtn.addEventListener('click', toggleVoice);

            // 重置按鈕
            resetBtn.addEventListener('click', resetScores);

            // 預載語音
            preloadVoices();

            // 初始狀態: 聲控關閉
            voiceEnabled = false;
            voiceToggleBtn.classList.remove('active');
            voiceStatus.textContent = '⏺ 關閉';

            // 額外: 點擊隊名或分數區塊不觸發其他
        }

        // 啟動
        init();

        // 由於語音清單可能非同步，延遲再試一次
        setTimeout(() => {
            if (window.speechSynthesis) {
                window.speechSynthesis.getVoices();
            }
        }, 300);
    })();
</script>

</body>
</html>
