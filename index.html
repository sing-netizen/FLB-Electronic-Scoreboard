<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>軟式曲棍球 · 電子記分牌</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0b1a2e 0%, #1a2f44 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .scoreboard {
      max-width: 900px;
      width: 100%;
      background: rgba(10, 25, 40, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 72px 72px 48px 48px;
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.7), 0 0 0 2px #4f7a9e inset, 0 0 0 4px #1f3b54 inset;
      padding: 30px 24px 40px;
      transition: all 0.2s;
    }

    .teams {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-evenly;
      gap: 20px 10px;
    }

    .team-card {
      flex: 1 1 200px;
      min-width: 160px;
      background: #1d3349;
      border-radius: 60px 60px 32px 32px;
      padding: 18px 12px 22px;
      box-shadow: 0 12px 0 #0b1725, 0 6px 12px rgba(0,0,0,0.5);
      text-align: center;
      border-bottom: 4px solid #4d7ca8;
      transition: transform 0.1s ease;
    }

    .team-card:active {
      transform: scale(0.98);
    }

    .team-name {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #f2f9ff;
      text-shadow: 0 3px 0 #0a1a2b, 0 2px 8px rgba(0,0,0,0.6);
      margin-bottom: 8px;
      word-break: break-word;
    }

    .score-display {
      font-size: 6.2rem;
      font-weight: 800;
      line-height: 1;
      color: #ffffff;
      background: #0c1a2b;
      padding: 10px 5px;
      margin: 12px 0 16px;
      border-radius: 48px;
      box-shadow: inset 0 -6px 0 #3a5e7a, 0 8px 0 #050f1a, 0 6px 16px rgba(0,0,0,0.6);
      text-shadow: 0 0 12px #7ab3e6;
      letter-spacing: 4px;
      transition: 0.08s linear;
    }

    .score-controls {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .btn-group {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      border: none;
      background: #2b4b68;
      color: white;
      font-size: 2.6rem;
      font-weight: 700;
      width: 70px;
      height: 70px;
      border-radius: 40px;
      box-shadow: 0 7px 0 #10212f, 0 4px 12px rgba(0, 0, 0, 0.6);
      cursor: pointer;
      transition: all 0.06s linear;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      touch-action: manipulation;
      border: 1px solid #6991b3;
    }

    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #10212f;
    }

    .btn-add {
      background: #1f8b4c;
      border-color: #7bc99b;
      box-shadow: 0 7px 0 #0e4123, 0 4px 12px rgba(0,0,0,0.5);
    }

    .btn-add:active {
      background: #28a35a;
    }

    .btn-sub {
      background: #a13a3a;
      border-color: #d97a7a;
      box-shadow: 0 7px 0 #5c1e1e, 0 4px 12px rgba(0,0,0,0.5);
    }

    .btn-sub:active {
      background: #c44a4a;
    }

    .btn-reset {
      background: #4f5f73;
      border-color: #8b9bb0;
      box-shadow: 0 7px 0 #2a3645;
      font-size: 1.8rem;
      width: 60px;
      height: 60px;
    }

    .btn-reset:active {
      background: #6a7d94;
    }

    .btn:disabled {
      opacity: 0.45;
      transform: translateY(4px);
      box-shadow: 0 3px 0 #10212f;
      pointer-events: none;
    }

    .global-reset {
      text-align: center;
      margin-top: 30px;
    }

    .btn-reset-global {
      background: #2d4057;
      border-color: #6a86a3;
      padding: 14px 32px;
      font-size: 1.8rem;
      border-radius: 60px;
      box-shadow: 0 8px 0 #172433;
      width: auto;
      height: auto;
      gap: 10px;
      letter-spacing: 2px;
    }

    .btn-reset-global:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #172433;
    }

    /* 語音提示區域 */
    .voice-status {
      margin-top: 24px;
      text-align: center;
      color: #b3d6f0;
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 1px;
      background: #132536;
      padding: 10px 16px;
      border-radius: 60px;
      display: inline-block;
      backdrop-filter: blur(4px);
      border: 1px solid #3d6280;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
      width: auto;
      margin-left: auto;
      margin-right: auto;
    }

    .voice-status i {
      font-style: normal;
      display: inline-block;
      margin-right: 6px;
    }

    .footer-tip {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
      gap: 8px 16px;
    }

    .badge {
      background: #1b3349;
      padding: 6px 18px;
      border-radius: 40px;
      color: #b3d0e8;
      font-size: 0.95rem;
      border: 1px solid #3b607d;
    }

    @media (max-width: 600px) {
      .scoreboard { padding: 20px 12px 30px; border-radius: 48px; }
      .team-card { min-width: 130px; padding: 14px 8px; }
      .team-name { font-size: 1.6rem; }
      .score-display { font-size: 4.6rem; padding: 4px 0; }
      .btn { width: 60px; height: 60px; font-size: 2.2rem; }
      .btn-reset { width: 50px; height: 50px; font-size: 1.5rem; }
      .btn-reset-global { font-size: 1.5rem; padding: 12px 22px; }
    }

    @media (max-width: 420px) {
      .score-display { font-size: 3.8rem; }
      .btn { width: 52px; height: 52px; font-size: 1.9rem; }
      .btn-reset { width: 44px; height: 44px; font-size: 1.3rem; }
      .team-name { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<div class="scoreboard" role="main" aria-label="軟式曲棍球電子記分牌">

  <div class="teams">
    <!-- 主隊 -->
    <div class="team-card" id="teamA-card">
      <div class="team-name" id="teamA-name">🏑 主隊</div>
      <div class="score-display" id="scoreA">0</div>
      <div class="score-controls">
        <div class="btn-group">
          <button class="btn btn-add" id="addA" aria-label="主隊加一分">➕</button>
          <button class="btn btn-sub" id="subA" aria-label="主隊減一分">➖</button>
          <button class="btn btn-reset" id="resetA" aria-label="主隊分數歸零">↺</button>
        </div>
      </div>
    </div>

    <!-- 客隊 -->
    <div class="team-card" id="teamB-card">
      <div class="team-name" id="teamB-name">🏸 客隊</div>
      <div class="score-display" id="scoreB">0</div>
      <div class="score-controls">
        <div class="btn-group">
          <button class="btn btn-add" id="addB" aria-label="客隊加一分">➕</button>
          <button class="btn btn-sub" id="subB" aria-label="客隊減一分">➖</button>
          <button class="btn btn-reset" id="resetB" aria-label="客隊分數歸零">↺</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 全域重設 + 語音狀態 -->
  <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 16px 20px; margin-top: 10px;">
    <div class="global-reset">
      <button class="btn btn-reset-global" id="resetAll">🔄 重設比賽</button>
    </div>
    <div class="voice-status" id="voiceStatus">
      <i>🔊</i> <span id="voiceMsg">語音就緒 · 點按加分/減分</span>
    </div>
  </div>

  <div class="footer-tip">
    <span class="badge">⚡ 按分數加減 (非 +/- )</span>
    <span class="badge">🎤 自動讀出各隊分數</span>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ---------- DOM 元素 ----------
    const scoreAEl = document.getElementById('scoreA');
    const scoreBEl = document.getElementById('scoreB');
    const addA = document.getElementById('addA');
    const subA = document.getElementById('subA');
    const resetA = document.getElementById('resetA');
    const addB = document.getElementById('addB');
    const subB = document.getElementById('subB');
    const resetB = document.getElementById('resetB');
    const resetAll = document.getElementById('resetAll');
    const voiceMsg = document.getElementById('voiceMsg');

    // 隊伍名稱 (用於語音)
    const nameA = document.getElementById('teamA-name').innerText.replace(/[🏑\s]/g, '').trim() || '主隊';
    const nameB = document.getElementById('teamB-name').innerText.replace(/[🏸\s]/g, '').trim() || '客隊';

    // ---------- 狀態 ----------
    let scoreA = 0;
    let scoreB = 0;

    // 語音合成 (只建立一次)
    let synth = window.speechSynthesis;
    let utterance = null;
    let voiceReady = false;

    // 檢查語音支援
    if (!synth) {
      voiceMsg.innerText = '⚠️ 瀏覽器不支援語音';
    } else {
      // 嘗試初始化語音
      try {
        // 簡單測試：建立一個空 utterance 不會觸發發音，但可確保 synth 可用
        const testUtter = new SpeechSynthesisUtterance(' ');
        testUtter.lang = 'zh-HK';
        voiceReady = true;
        voiceMsg.innerText = '🎤 語音就緒 · 加分/減分朗讀分數';
      } catch (e) {
        voiceMsg.innerText = '⚠️ 語音初始化失敗';
        console.warn('Speech synthesis init error:', e);
      }
    }

    // ---------- 語音朗讀函數 (讀出兩隊分數) ----------
    function speakScores() {
      // 如果語音未就緒或沒有 synth，跳過
      if (!synth || !voiceReady) {
        return;
      }

      // 取消任何進行中的語音
      if (synth.speaking) {
        synth.cancel();
      }

      // 建立要朗讀的文字 (廣東話 / 普通話混合，以「分」為單位)
      const text = `${nameA} ${scoreA} 分，${nameB} ${scoreB} 分`;

      utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-HK';          // 香港中文 (廣東話)
      utterance.rate = 0.95;
      utterance.pitch = 1.05;
      utterance.volume = 1;

      // 選擇聲音 (若有 zh-HK 優先)
      const voices = synth.getVoices();
      const zhVoice = voices.find(v => v.lang.includes('zh-HK') || v.lang.includes('zh-TW') || v.lang.includes('zh-CN'));
      if (zhVoice) {
        utterance.voice = zhVoice;
      }

      // 開始朗讀
      synth.speak(utterance);
    }

    // 由於某些瀏覽器需要先載入 voices，當 voices 改變時嘗試更新
    if (synth) {
      synth.onvoiceschanged = () => {
        // 可選：更新語音設定
      };
    }

    // ---------- 更新畫面 + 語音 (整合) ----------
    function updateDisplayAndSpeak() {
      // 更新數字
      scoreAEl.textContent = scoreA;
      scoreBEl.textContent = scoreB;

      // 朗讀分數 (每次變更都讀)
      speakScores();
    }

    // ---------- 分數操作 (直接加/減分數) ----------
    function addScore(team) {
      if (team === 'A') {
        scoreA = Math.min(scoreA + 1, 99);   // 上限99，避免版面爆
      } else if (team === 'B') {
        scoreB = Math.min(scoreB + 1, 99);
      }
      updateDisplayAndSpeak();
    }

    function subScore(team) {
      if (team === 'A') {
        scoreA = Math.max(scoreA - 1, 0);    // 下限0
      } else if (team === 'B') {
        scoreB = Math.max(scoreB - 1, 0);
      }
      updateDisplayAndSpeak();
    }

    function resetTeam(team) {
      if (team === 'A') {
        scoreA = 0;
      } else if (team === 'B') {
        scoreB = 0;
      }
      updateDisplayAndSpeak();
    }

    function resetAllScores() {
      scoreA = 0;
      scoreB = 0;
      updateDisplayAndSpeak();
    }

    // ---------- 綁定事件 (使用點擊，支援觸控) ----------
    addA.addEventListener('click', (e) => {
      e.preventDefault();
      addScore('A');
    });

    subA.addEventListener('click', (e) => {
      e.preventDefault();
      subScore('A');
    });

    resetA.addEventListener('click', (e) => {
      e.preventDefault();
      resetTeam('A');
    });

    addB.addEventListener('click', (e) => {
      e.preventDefault();
      addScore('B');
    });

    subB.addEventListener('click', (e) => {
      e.preventDefault();
      subScore('B');
    });

    resetB.addEventListener('click', (e) => {
      e.preventDefault();
      resetTeam('B');
    });

    resetAll.addEventListener('click', (e) => {
      e.preventDefault();
      resetAllScores();
    });

    // 額外：按鍵觸發時震動回饋（可選），及防止雙擊選取
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('mousedown', (e) => {
        // 輕微觸覺回饋（僅限支援）
        if (navigator.vibrate) navigator.vibrate(8);
      });
    });

    // ---------- 初始化顯示 (確保語音讀出初始分數) ----------
    // 延遲一小段時間讓語音系統完全載入
    setTimeout(() => {
      updateDisplayAndSpeak();
    }, 300);

    // 另外在頁面載入完成後再讀一次 (有些瀏覽器需要互動)
    window.addEventListener('load', () => {
      setTimeout(() => {
        // 如果未說話，主動讀一次
        if (synth && !synth.speaking) {
          speakScores();
        }
      }, 800);
    });

    // 針對使用者第一次點擊時，若語音未發聲則觸發 (某些瀏覽器限制)
    document.addEventListener('click', function firstClick() {
      if (synth && voiceReady && !synth.speaking) {
        speakScores();
      }
      // 移除監聽，只觸發一次
      document.removeEventListener('click', firstClick);
    }, { once: true });

    // 額外：若語音被中斷，可再次嘗試 (但非必須)
    console.log('🏑 軟式曲棍球記分牌已啟動 · 聲控模式: 讀出各隊分數');
  })();
</script>
</body>
</html>
