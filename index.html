<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>軟式曲棍球 電子記分牌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b2a3e 0%, #1a4a5f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .scoreboard {
            max-width: 680px;
            width: 100%;
            background: #1f3e4c;
            background-image: radial-gradient(circle at 20% 30%, #2b5b6e, #12303d);
            border-radius: 56px 56px 40px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 0 2px #7fc1d4 inset, 0 0 0 4px #2f637a inset;
            padding: 28px 24px 32px;
            transition: all 0.2s;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            color: #d4edf8;
            text-shadow: 0 2px 3px rgba(0,0,0,0.5);
            padding: 0 8px 12px 8px;
            border-bottom: 2px solid #69aec9;
            letter-spacing: 1px;
        }
        .game-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
            background: #0e2d3b;
            padding: 0 18px;
            border-radius: 40px;
            line-height: 2.2rem;
            box-shadow: inset 0 -2px 0 #5e9eb8;
        }
        .game-header .time-slot {
            font-size: 1.0rem;
            background: #173e4d;
            padding: 4px 18px;
            border-radius: 60px;
            font-weight: 500;
            box-shadow: inset 0 1px 4px #318098;
        }
        .teams-container {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            gap: 12px;
            margin: 24px 0 12px 0;
        }
        .team-card {
            flex: 1;
            background: #152f3b;
            background: linear-gradient(160deg, #1b4151, #0f2d3a);
            border-radius: 48px 48px 28px 28px;
            padding: 20px 10px 18px;
            box-shadow: 0 8px 0 #0a1f27, 0 12px 20px rgba(0,0,0,0.4);
            text-align: center;
            border: 1px solid #4897b0;
            transition: all 0.1s ease;
        }
        .team-card.away {
            background: linear-gradient(160deg, #1f3f4a, #112a33);
        }
        .team-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f2faff;
            text-shadow: 0 3px 0 #0a202b, 0 6px 8px rgba(0,0,0,0.6);
            letter-spacing: 2px;
            word-break: break-word;
            padding: 0 6px;
        }
        .team-name small {
            font-size: 1.0rem;
            font-weight: 400;
            opacity: 0.8;
        }
        .score-display {
            background: #0e1e26;
            margin: 12px 4px 16px 4px;
            padding: 12px 6px;
            border-radius: 60px;
            box-shadow: inset 0 6px 10px rgba(0,0,0,0.6), 0 0 0 1px #378aa5;
            font-size: 4.8rem;
            font-weight: 800;
            color: #f5fcff;
            letter-spacing: 6px;
            text-shadow: 0 0 10px #9fd3e8, 0 4px 0 #0e2d3a;
            line-height: 1.2;
            font-family: 'Courier New', monospace;
        }
        .score-display span {
            display: inline-block;
            min-width: 80px;
        }
        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 6px 0 4px;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            background: #355f70;
            background: linear-gradient(180deg, #4b839b, #1d4658);
            color: white;
            font-size: 2.2rem;
            font-weight: 700;
            width: 74px;
            height: 74px;
            border-radius: 60px;
            box-shadow: 0 8px 0 #0b2937, 0 6px 12px black;
            cursor: pointer;
            transition: 0.07s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            border: 1px solid #78bedb;
            text-shadow: 0 2px 0 #0e2a33;
            line-height: 1;
        }
        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0b2937;
        }
        .btn.minus {
            background: linear-gradient(180deg, #9e5f5f, #6e3a3a);
            box-shadow: 0 8px 0 #3f2121, 0 6px 12px black;
            border-color: #c78686;
        }
        .btn.minus:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #3f2121;
        }
        .btn.reset-btn {
            background: #3b4d57;
            background: linear-gradient(180deg, #5e7b89, #2a4452);
            box-shadow: 0 8px 0 #172f39, 0 6px 12px black;
            font-size: 1.2rem;
            width: 70px;
            height: 70px;
            border-color: #809faf;
        }
        .btn.reset-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #172f39;
        }
        .btn:disabled {
            opacity: 0.5;
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0b2937;
            pointer-events: none;
        }
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 28px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .global-reset {
            background: #283f49;
            background: linear-gradient(180deg, #3a5d6b, #1d3946);
            border: none;
            color: #ddf0fa;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 6px 0 #10222b, 0 6px 12px black;
            cursor: pointer;
            transition: 0.06s linear;
            border: 1px solid #639eb3;
            flex: 1;
            min-width: 120px;
            letter-spacing: 1px;
            touch-action: manipulation;
        }
        .global-reset:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #10222b;
        }
        .period-indicator {
            background: #16313d;
            padding: 10px 18px;
            border-radius: 60px;
            color: #bee2f0;
            font-weight: 600;
            font-size: 1.1rem;
            border: 1px solid #4791ab;
            box-shadow: inset 0 2px 6px #0b232d;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .period-indicator span {
            background: #0f2732;
            padding: 0 14px;
            border-radius: 40px;
            line-height: 2rem;
            font-size: 1.3rem;
            color: #c7e9fc;
        }
        .footer-note {
            margin-top: 24px;
            color: #73b1c7;
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            border-top: 1px solid #2d677b;
            padding-top: 18px;
            opacity: 0.8;
        }
        @media (max-width: 550px) {
            .scoreboard { padding: 20px 12px; }
            .team-name { font-size: 1.4rem; }
            .score-display { font-size: 3.6rem; }
            .btn { width: 62px; height: 62px; font-size: 1.8rem; }
            .btn.reset-btn { width: 60px; height: 60px; font-size: 1rem; }
            .game-header h2 { font-size: 1.0rem; }
            .period-indicator { font-size: 0.9rem; padding: 6px 12px; }
        }
        @media (max-width: 400px) {
            .btn { width: 54px; height: 54px; font-size: 1.6rem; }
            .btn.reset-btn { width: 52px; height: 52px; font-size: 0.9rem; }
            .score-display { font-size: 3rem; }
        }
        /* 避免雙擊選取 */
        .btn, .global-reset {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div class="scoreboard" role="application" aria-label="軟式曲棍球電子記分牌">
        <!-- 標題區 -->
        <div class="game-header">
            <h2>🏑 軟式曲棍球</h2>
            <div class="time-slot">⚡ 即時</div>
        </div>

        <!-- 兩隊卡片 -->
        <div class="teams-container">
            <!-- 主隊 -->
            <div class="team-card home" id="homeTeam">
                <div class="team-name">主隊 <small>HOME</small></div>
                <div class="score-display" id="homeScore">0</div>
                <div class="button-group">
                    <button class="btn minus" id="homeMinus" aria-label="主隊減分">−</button>
                    <button class="btn" id="homePlus" aria-label="主隊加分">+</button>
                </div>
                <div style="margin-top: 6px;">
                    <button class="btn reset-btn" id="homeReset" aria-label="主隊歸零">⟲</button>
                </div>
            </div>

            <!-- 客隊 -->
            <div class="team-card away" id="awayTeam">
                <div class="team-name">客隊 <small>AWAY</small></div>
                <div class="score-display" id="awayScore">0</div>
                <div class="button-group">
                    <button class="btn minus" id="awayMinus" aria-label="客隊減分">−</button>
                    <button class="btn" id="awayPlus" aria-label="客隊加分">+</button>
                </div>
                <div style="margin-top: 6px;">
                    <button class="btn reset-btn" id="awayReset" aria-label="客隊歸零">⟲</button>
                </div>
            </div>
        </div>

        <!-- 底部控制 -->
        <div class="action-bar">
            <div class="period-indicator">
                <span>🏆</span> 比賽進行中
            </div>
            <button class="global-reset" id="globalReset">🔄 全場歸零</button>
        </div>
        <div class="footer-note">
            ⚡ 按 ＋ 或 − 增減分數 · 無需手動輸入
        </div>
    </div>

    <script>
        (function() {
            // 取得 DOM 元素
            const homeScoreEl = document.getElementById('homeScore');
            const awayScoreEl = document.getElementById('awayScore');
            const homePlus = document.getElementById('homePlus');
            const homeMinus = document.getElementById('homeMinus');
            const awayPlus = document.getElementById('awayPlus');
            const awayMinus = document.getElementById('awayMinus');
            const homeReset = document.getElementById('homeReset');
            const awayReset = document.getElementById('awayReset');
            const globalReset = document.getElementById('globalReset');

            // 分數狀態 (初始為0)
            let homeScore = 0;
            let awayScore = 0;

            // 分數顯示更新函式 (確保顯示非負整數)
            function updateDisplay() {
                homeScoreEl.textContent = Math.max(0, homeScore);
                awayScoreEl.textContent = Math.max(0, awayScore);
            }

            // ----- 主隊操作 -----
            function homeAdd() {
                homeScore = Math.max(0, homeScore + 1);
                updateDisplay();
            }
            function homeSubtract() {
                homeScore = Math.max(0, homeScore - 1);
                updateDisplay();
            }
            function homeResetScore() {
                homeScore = 0;
                updateDisplay();
            }

            // ----- 客隊操作 -----
            function awayAdd() {
                awayScore = Math.max(0, awayScore + 1);
                updateDisplay();
            }
            function awaySubtract() {
                awayScore = Math.max(0, awayScore - 1);
                updateDisplay();
            }
            function awayResetScore() {
                awayScore = 0;
                updateDisplay();
            }

            // ----- 全場歸零 -----
            function resetAll() {
                homeScore = 0;
                awayScore = 0;
                updateDisplay();
            }

            // ----- 綁定事件 (按一下觸發，無須雙擊) -----
            // 主隊
            homePlus.addEventListener('click', homeAdd);
            homeMinus.addEventListener('click', homeSubtract);
            homeReset.addEventListener('click', homeResetScore);

            // 客隊
            awayPlus.addEventListener('click', awayAdd);
            awayMinus.addEventListener('click', awaySubtract);
            awayReset.addEventListener('click', awayResetScore);

            // 全局重置
            globalReset.addEventListener('click', resetAll);

            // ----- 鍵盤快捷鍵 (輔助，按一下加減) -----
            document.addEventListener('keydown', (e) => {
                // 防止與輸入框互動干擾 (但此頁無輸入框)
                const key = e.key;
                // 主隊: A / Z  (加分/減分)  ;  客隊: K / M  (加分/減分)
                // 同時支援 Shift 或 單按 (不干擾)
                if (key === 'a' || key === 'A') {
                    e.preventDefault();
                    homeAdd();
                } else if (key === 'z' || key === 'Z') {
                    e.preventDefault();
                    homeSubtract();
                } else if (key === 'k' || key === 'K') {
                    e.preventDefault();
                    awayAdd();
                } else if (key === 'm' || key === 'M') {
                    e.preventDefault();
                    awaySubtract();
                } else if (key === 'r' || key === 'R') {
                    // 按 R 鍵 全場歸零 (謹慎使用)
                    if (!e.ctrlKey && !e.metaKey) {
                        e.preventDefault();
                        resetAll();
                    }
                }
            });

            // 確保初始顯示正確 (0)
            updateDisplay();

            // 防止觸控時雙擊選取文字或按鈕內部反白
            document.querySelectorAll('.btn, .global-reset').forEach(el => {
                el.addEventListener('mousedown', (e) => e.preventDefault());
            });

            // 加一個小提示：開發者可以輕鬆看到分數 (console 不強制)
            console.log('🏑 軟式曲棍球記分牌已啟動！ 按 A/Z 主隊 +/- , K/M 客隊 +/- , R 全場歸零');
        })();
    </script>
</body>
</html>
